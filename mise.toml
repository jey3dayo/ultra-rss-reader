[env]
_.path = ["./node_modules/.bin"]

[tools]
node = "24"
pnpm = "latest"
rust = "stable"
taplo = "latest"

[tasks.format]
description = "Format all (TS + Rust + TOML)"
run = ["pnpm run format", "cargo fmt --manifest-path src-tauri/Cargo.toml --all", "taplo fmt mise.toml"]

[tasks."lint:types"]
description = "TypeScript type check"
run = "pnpm exec tsc --noEmit"

[tasks."lint:biome"]
description = "Biome lint check"
run = "pnpm run lint"

[tasks."lint:clippy"]
description = "Rust clippy"
run = "cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings"

[tasks."test:rust"]
description = "Run Rust tests"
run = "cargo test --manifest-path src-tauri/Cargo.toml"

[tasks."test:unit"]
description = "Run Vitest unit tests"
run = "pnpm run test"

[tasks.test]
description = "Run all tests"
depends = ["test:rust", "test:unit"]

[tasks."test:live"]
description = "Run FreshRSS live integration tests (requires .env with credentials)"
run = "dotenvx run -- cargo test --manifest-path src-tauri/Cargo.toml freshrss_live -- --ignored --nocapture"

[tasks.build]
description = "Build all"
run = ["pnpm build"]

[tasks.lint]
description = "All lint checks"
depends = ["lint:types", "lint:biome", "lint:clippy"]

[tasks.check]
description = "Local verification"
depends = ["format", "lint", "test"]

[tasks.ci]
description = "CI equivalent"
depends = ["format", "lint", "test", "build"]
