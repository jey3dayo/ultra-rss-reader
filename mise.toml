# ========================================
# グローバル設定
# ========================================

[env]
_.path = ["./node_modules/.bin"]

# Markdown lint/format
MD_GLOB = "**/*.md"
MD_EXCLUDE_NODE_MODULES = "#**/node_modules/**"
MD_EXCLUDE_WORKTREES = "#**/.worktrees/**"

[tools]
node = "24"
pnpm = "latest"
rust = "stable"
taplo = "latest"
rtk = "latest"
"pipx:yamllint" = "latest"

# ========================================
# フォーマット（自動修正）
# ========================================

[tasks.format]
description = "Format all (TS + Rust + TOML)"
depends = ["format:biome", "format:rust", "format:toml", "format:md"]

[tasks."format:biome"]
description = "Biome format + lint + import sort autofix"
run = "biome check --write --formatter-enabled=true --linter-enabled=true ."

[tasks."format:rust"]
description = "Rust format"
run = "cargo fmt --manifest-path src-tauri/Cargo.toml --all"

[tasks."format:toml"]
description = "TOML format"
run = "taplo fmt mise.toml src-tauri/Cargo.toml"

[tasks."format:md"]
description = "Markdown format + lint autofix"
run = "pnpm markdownlint-cli2 **/*.md #**/node_modules/** #**/.worktrees/** #**/target/** --fix"

# ========================================
# フォーマットチェック（書き込みなし、CI用）
# ========================================

[tasks."format:check"]
description = "Format check all (no writes)"
depends = [
  "format:biome:check",
  "format:rust:check",
  "format:toml:check",
  "lint:md",
]

[tasks."format:biome:check"]
description = "Biome format + lint check (no writes)"
run = "rtk err biome check --formatter-enabled=true --linter-enabled=true ."

[tasks."format:rust:check"]
description = "Rust format check (no writes)"
run = "rtk err cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check"

[tasks."format:toml:check"]
description = "TOML format check (no writes)"
run = "rtk err taplo fmt --check mise.toml src-tauri/Cargo.toml"

# ========================================
# リント
# ========================================

[tasks.lint]
description = "All lint checks"
depends = ["lint:types", "lint:biome", "lint:clippy", "lint:md", "lint:yaml"]

[tasks."lint:types"]
description = "TypeScript type check"
run = "rtk pnpm exec tsc --noEmit"

[tasks."lint:biome"]
description = "Biome lint check"
run = "rtk pnpm run lint"
run_windows = "pnpm exec biome lint ."

[tasks."lint:clippy"]
description = "Rust clippy"
run = "rtk err cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings"

[tasks."lint:md"]
description = "Markdown lint check"
run = "pnpm markdownlint-cli2 **/*.md #**/node_modules/** #**/.worktrees/** #**/target/**"

[tasks."lint:yaml"]
description = "YAML lint check"
run = "yamllint -c .yamllint .github/"

[tasks."lint:actions"]
description = "GitHub Actions workflow check (actionlint)"
run = "actionlint"

# ========================================
# テスト
# ========================================

[tasks.test]
description = "Run all tests"
depends = ["test:rust", "test:unit"]

[tasks."test:rust"]
description = "Run Rust tests"
run = "rtk test cargo test --manifest-path src-tauri/Cargo.toml"
run_windows = "rtk test cargo test --manifest-path src-tauri/Cargo.toml --test integration_test"

[tasks."test:unit"]
description = "Run Vitest unit tests"
run = "rtk test pnpm run test"
run_windows = "pnpm exec vitest run"

[tasks."test:e2e"]
description = "Run Playwright E2E tests"
run = "rtk test pnpm exec playwright test"
run_windows = "pnpm exec playwright test"

[tasks."test:all"]
description = "Run all tests including E2E"
depends = ["test:rust", "test:unit", "test:e2e"]

[tasks."test:live"]
description = "Run FreshRSS live integration tests (requires .env with credentials)"
run = "dotenvx run -- rtk test cargo test --manifest-path src-tauri/Cargo.toml freshrss_live -- --ignored --nocapture"

# ========================================
# ビルド
# ========================================

[tasks.build]
description = "Build frontend"
run = ["pnpm build"]

# ========================================
# アプリ（Tauri）
# ========================================

[tasks."app:dev"]
description = "Run native app in dev mode"
env = { DEV_CREDENTIALS = "1" }
run = "pnpm exec tauri dev -c src-tauri/tauri.dev.conf.json"

[tasks."app:dev:web-preview"]
description = "Run native app in dev mode and open VITE_DEV_WEB_URL directly in Web Preview (optionally sized by VITE_DEV_WINDOW_WIDTH/HEIGHT)"
env = { DEV_CREDENTIALS = "1", VITE_DEV_INTENT = "open-web-preview-url" }
run = "pnpm exec tauri dev -c src-tauri/tauri.dev.conf.json"

[tasks."app:dev:feed-cleanup"]
description = "Run native app in dev mode and jump into the feed cleanup page"
env = { DEV_CREDENTIALS = "1", VITE_DEV_INTENT = "open-feed-cleanup" }
run = "pnpm exec tauri dev -c src-tauri/tauri.dev.conf.json"

[tasks."app:dev:signed"]
description = "Build, codesign, and run native app on macOS (no Keychain dialog)"
run = """
pnpm dev &
DEV_PID=$!
cargo build --manifest-path src-tauri/Cargo.toml
codesign -s "UltraRSSReader-Dev" -f src-tauri/target/debug/ultra-rss-reader
src-tauri/target/debug/ultra-rss-reader
kill $DEV_PID 2>/dev/null || true
"""
run_windows = "echo app:dev:signed is macOS-only (requires codesign and Unix shell tooling). && exit /b 1"

[tasks."app:open"]
description = "Remove quarantine & ad-hoc sign, then open the installed app on macOS"
run = """
APP="/Applications/Ultra RSS Reader.app"
if [ ! -d "$APP" ]; then
  echo "Error: $APP not found" >&2
  exit 1
fi
xattr -cr "$APP"
codesign --force --deep --sign - "$APP"
open "$APP"
"""
run_windows = "echo app:open is macOS-only (expects /Applications, xattr, and open). && exit /b 1"

[tasks."app:dev:browser"]
description = "Run frontend dev server for browser UI testing"
run = "pnpm dev --host 127.0.0.1 --port 4173 --strictPort"

[tasks."app:dev:browser:feed-cleanup"]
description = "Run browser-mode UI testing and jump into the feed cleanup page"
env = { VITE_DEV_INTENT = "open-feed-cleanup" }
run = "pnpm dev --host 127.0.0.1 --port 4173 --strictPort"

[tasks."app:build"]
description = "Build native app for current platform (.app/.dmg on macOS, .msi/.exe on Windows)"
run = "pnpm exec tauri build"

[tasks."app:build:debug"]
description = "Build native app in debug mode (faster, no optimizations)"
run = "pnpm exec tauri build --debug"

[tasks."app:icon"]
description = "Generate app icons from source image"
run = "pnpm exec tauri icon"

# ========================================
# エイリアス（まとめ実行）
# ========================================

[tasks.check]
description = "Local verification (format + lint + test)"
depends = ["format", "lint", "test"]

[tasks.ci]
description = "CI equivalent (format:check + lint + test + build)"
depends = ["format:check", "lint", "test", "build"]
