# ========================================
# グローバル設定
# ========================================

[env]
_.path = ["./node_modules/.bin"]

# Markdown lint/format
MD_GLOB = "**/*.md"
MD_EXCLUDE_NODE_MODULES = "#**/node_modules/**"
MD_EXCLUDE_WORKTREES = "#**/.worktrees/**"

[tools]
node = "24"
pnpm = "latest"
rust = "stable"
taplo = "latest"
"pipx:yamllint" = "latest"

# ========================================
# フォーマット（自動修正）
# ========================================

[tasks.format]
description = "Format all (TS + Rust + TOML)"
depends = ["format:biome", "format:rust", "format:toml", "format:md"]

[tasks."format:biome"]
description = "Biome format + lint + import sort autofix"
run = "biome check --write --formatter-enabled=true --linter-enabled=true ."

[tasks."format:rust"]
description = "Rust format"
run = "cargo fmt --manifest-path src-tauri/Cargo.toml --all"

[tasks."format:toml"]
description = "TOML format"
run = "taplo fmt mise.toml src-tauri/Cargo.toml"

[tasks."format:md"]
description = "Markdown format + lint autofix"
run = 'pnpm markdownlint-cli2 "${MD_GLOB}" ${MD_EXCLUDE_NODE_MODULES} ${MD_EXCLUDE_WORKTREES} --fix'

# ========================================
# フォーマットチェック（書き込みなし、CI用）
# ========================================

[tasks."format:check"]
description = "Format check all (no writes)"
depends = [
  "format:biome:check",
  "format:rust:check",
  "format:toml:check",
  "lint:md",
]

[tasks."format:biome:check"]
description = "Biome format + lint check (no writes)"
run = "biome check --formatter-enabled=true --linter-enabled=true ."

[tasks."format:rust:check"]
description = "Rust format check (no writes)"
run = "cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check"

[tasks."format:toml:check"]
description = "TOML format check (no writes)"
run = "taplo fmt --check mise.toml src-tauri/Cargo.toml"

# ========================================
# リント
# ========================================

[tasks.lint]
description = "All lint checks"
depends = ["lint:types", "lint:biome", "lint:clippy", "lint:md", "lint:yaml"]

[tasks."lint:types"]
description = "TypeScript type check"
run = "pnpm exec tsc --noEmit"

[tasks."lint:biome"]
description = "Biome lint check"
run = "pnpm run lint"

[tasks."lint:clippy"]
description = "Rust clippy"
run = "cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings"

[tasks."lint:md"]
description = "Markdown lint check"
run = 'pnpm markdownlint-cli2 "${MD_GLOB}" ${MD_EXCLUDE_NODE_MODULES} ${MD_EXCLUDE_WORKTREES}'

[tasks."lint:yaml"]
description = "YAML lint check"
run = "yamllint -c .yamllint .github/"

[tasks."lint:actions"]
description = "GitHub Actions workflow check (actionlint)"
run = "actionlint"

# ========================================
# テスト
# ========================================

[tasks.test]
description = "Run all tests"
depends = ["test:rust", "test:unit"]

[tasks."test:rust"]
description = "Run Rust tests"
run = "cargo test --manifest-path src-tauri/Cargo.toml -- --format terse"

[tasks."test:unit"]
description = "Run Vitest unit tests"
run = "pnpm run test -- --reporter=dot"

[tasks."test:e2e"]
description = "Run Playwright E2E tests"
run = "pnpm exec playwright test --reporter=dot"

[tasks."test:all"]
description = "Run all tests including E2E"
depends = ["test:rust", "test:unit", "test:e2e"]

[tasks."test:live"]
description = "Run FreshRSS live integration tests (requires .env with credentials)"
run = "dotenvx run -- cargo test --manifest-path src-tauri/Cargo.toml freshrss_live -- --ignored --nocapture --format terse"

# ========================================
# ビルド
# ========================================

[tasks.build]
description = "Build frontend"
run = ["pnpm build"]

# ========================================
# アプリ（Tauri）
# ========================================

[tasks."app:dev"]
description = "Run native app in dev mode"
run = "dotenvx run -- pnpm tauri dev -c src-tauri/tauri.dev.conf.json"

[tasks."app:dev:signed"]
description = "Build, codesign, and run native app (no Keychain dialog)"
run = """
pnpm dev &
DEV_PID=$!
cargo build --manifest-path src-tauri/Cargo.toml
codesign -s "UltraRSSReader-Dev" -f src-tauri/target/debug/ultra-rss-reader
src-tauri/target/debug/ultra-rss-reader
kill $DEV_PID 2>/dev/null || true
"""

[tasks."app:open"]
description = "Remove quarantine & ad-hoc sign, then open the installed app"
run = """
APP="/Applications/Ultra RSS Reader.app"
if [ ! -d "$APP" ]; then
  echo "Error: $APP not found" >&2
  exit 1
fi
xattr -cr "$APP"
codesign --force --deep --sign - "$APP"
open "$APP"
"""

[tasks."app:dev:browser"]
description = "Run frontend dev server for browser UI testing"
run = "pnpm dev --host 127.0.0.1 --port 4173 --strictPort"

[tasks."app:build"]
description = "Build native app for current platform (.app/.dmg on macOS, .msi/.exe on Windows)"
run = "pnpm tauri build"

[tasks."app:build:debug"]
description = "Build native app in debug mode (faster, no optimizations)"
run = "pnpm tauri build --debug"

[tasks."app:icon"]
description = "Generate app icons from source image"
run = "pnpm tauri icon"

# ========================================
# エイリアス（まとめ実行）
# ========================================

[tasks.check]
description = "Local verification (format + lint + test)"
depends = ["format", "lint", "test"]

[tasks.ci]
description = "CI equivalent (format:check + lint + test + build)"
depends = ["format:check", "lint", "test", "build"]
