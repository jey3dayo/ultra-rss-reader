changelog:
  exclude:
    labels:
      - dependencies
      - skip-changelog
  categories:
    - title: "💥 Breaking Changes"
      labels: [breaking]
    - title: "🚀 Features"
      labels: [feature, enhancement]
    - title: "🐛 Bug Fixes"
      labels: [bug, fix]
    - title: "📚 Documentation"
      labels: [docs]
    - title: "🔧 Maintenance"
      labels: [chore, refactor]
    - title: "Other Changes"
      labels: ["*"]
