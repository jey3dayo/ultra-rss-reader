name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TAURI_SYSTEM_DEPS: >-
    libwebkit2gtk-4.1-dev
    libgtk-3-dev
    libayatana-appindicator3-dev
    librsvg2-dev
    patchelf

jobs:
  format:
    name: "Check: Format"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - run: pnpm install --frozen-lockfile

      - run: mise run format:check

  lint:
    name: "Check: Lint"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Tauri system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.TAURI_SYSTEM_DEPS }}

      - uses: jdx/mise-action@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - run: mise run lint

  test:
    name: "Check: Test"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Tauri system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.TAURI_SYSTEM_DEPS }}

      - uses: jdx/mise-action@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - run: mise run test

  build:
    name: "Check: Build"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - run: pnpm install --frozen-lockfile

      - run: mise run build

  native-smoke:
    name: "Check: Native Smoke"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - run: mise run app:build:debug

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [format, lint, test, build, native-smoke]
    if: always()

    steps:
      - name: Determine overall result
        env:
          FORMAT_RESULT: ${{ needs.format.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          NATIVE_SMOKE_RESULT: ${{ needs.native-smoke.result }}
        shell: bash
        run: |
          set -euo pipefail

          failed=0
          if [ "$FORMAT_RESULT" != "success" ]; then
            echo "::error::Format FAILED ($FORMAT_RESULT)"
            failed=1
          fi
          if [ "$LINT_RESULT" != "success" ]; then
            echo "::error::Lint FAILED ($LINT_RESULT)"
            failed=1
          fi
          if [ "$TEST_RESULT" != "success" ]; then
            echo "::error::Test FAILED ($TEST_RESULT)"
            failed=1
          fi
          if [ "$BUILD_RESULT" != "success" ]; then
            echo "::error::Build FAILED ($BUILD_RESULT)"
            failed=1
          fi
          if [ "$NATIVE_SMOKE_RESULT" != "success" ]; then
            echo "::error::Native Smoke FAILED ($NATIVE_SMOKE_RESULT)"
            failed=1
          fi

          if [ "$failed" -eq 0 ]; then
            echo "## Quality Gate: PASSED" >> "$GITHUB_STEP_SUMMARY"
            echo "All required checks completed successfully." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "## Quality Gate: FAILED" >> "$GITHUB_STEP_SUMMARY"
          echo "Some required checks have failed." >> "$GITHUB_STEP_SUMMARY"
          exit 1
