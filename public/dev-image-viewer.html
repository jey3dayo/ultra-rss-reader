<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Debug Image Viewer</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          "BIZ UDPGothic",
          "Yu Gothic",
          system-ui,
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.06), transparent 28%),
          #090909;
        color: #f6f6f6;
      }

      .stage {
        width: min(100vw, 1220px);
        min-height: 100vh;
        padding: 24px clamp(16px, 4vw, 40px) 56px;
        display: grid;
        place-items: start center;
      }

      .page {
        width: min(100%, 980px);
        aspect-ratio: 0.73;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 22px 50px rgba(0, 0, 0, 0.45);
        background: #111;
      }

      svg {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <main class="stage" aria-label="Debug image viewer mock">
      <section class="page">
        <svg viewBox="0 0 900 1230" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Manga style debug page">
          <rect width="900" height="1230" fill="#f5f5f5" />
          <rect x="0" y="0" width="900" height="140" fill="#0f0f0f" />
          <text x="60" y="88" fill="#fafafa" font-size="40" font-family="BIZ UDPGothic, sans-serif">Debug Viewer Mock</text>
          <rect x="52" y="194" width="376" height="430" rx="18" fill="#ffffff" stroke="#161616" stroke-width="14" />
          <rect x="476" y="194" width="372" height="430" rx="18" fill="#ffffff" stroke="#161616" stroke-width="14" />
          <rect x="52" y="684" width="796" height="484" rx="18" fill="#ffffff" stroke="#161616" stroke-width="14" />
          <ellipse cx="676" cy="390" rx="118" ry="152" fill="#dcdcdc" />
          <ellipse cx="648" cy="360" rx="44" ry="44" fill="#f5f5f5" />
          <ellipse cx="724" cy="360" rx="44" ry="44" fill="#f5f5f5" />
          <circle cx="648" cy="360" r="16" fill="#0f0f0f" />
          <circle cx="724" cy="360" r="16" fill="#0f0f0f" />
          <path d="M606 452 C652 514, 728 514, 770 452" fill="none" stroke="#0f0f0f" stroke-width="16" stroke-linecap="round" />
          <path d="M592 308 C624 230, 740 216, 794 294" fill="none" stroke="#0f0f0f" stroke-width="20" stroke-linecap="round" />
          <path d="M118 750 C240 670, 360 720, 420 834" fill="none" stroke="#171717" stroke-width="22" stroke-linecap="round" />
          <path d="M152 924 C288 1022, 470 1018, 604 900" fill="none" stroke="#171717" stroke-width="20" stroke-linecap="round" />
          <path d="M458 720 L826 1114" stroke="#cdcdcd" stroke-width="14" />
          <path d="M512 694 L848 1050" stroke="#dddddd" stroke-width="10" />
          <text x="100" y="1140" fill="#111" font-size="48" font-family="BIZ UDPGothic, sans-serif">Image viewer style overlay tuning target</text>
        </svg>
      </section>
    </main>
  </body>
</html>
